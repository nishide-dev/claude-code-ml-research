name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run plugin validation
        run: uv run python scripts/validate_plugin.py

      - name: Run tests with Pytest
        run: uv run pytest --cov=scripts --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  plugin-structure:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Check required files
        run: |
          test -f README.md || (echo "README.md not found" && exit 1)
          test -f LICENSE || (echo "LICENSE not found" && exit 1)
          test -d commands || (echo "commands/ directory not found" && exit 1)
          test -d agents || (echo "agents/ directory not found" && exit 1)
          test -d skills || (echo "skills/ directory not found" && exit 1)

      - name: Check command files
        run: |
          find commands -name "*.md" -type f | while read f; do
            test -s "$f" || (echo "$f is empty" && exit 1)
          done

      - name: Check agent files
        run: |
          find agents -name "*.md" -type f | while read f; do
            test -s "$f" || (echo "$f is empty" && exit 1)
            head -1 "$f" | grep -q "^---$" || (echo "$f missing frontmatter" && exit 1)
          done
