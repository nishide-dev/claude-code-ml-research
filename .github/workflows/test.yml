name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run plugin validation
        run: |
          python scripts/validate_plugin.py

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            --verbose \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  plugin-structure:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Check required files
        run: |
          test -f README.md || (echo "README.md not found" && exit 1)
          test -f LICENSE || (echo "LICENSE not found" && exit 1)
          test -d commands || (echo "commands/ directory not found" && exit 1)
          test -d agents || (echo "agents/ directory not found" && exit 1)
          test -d skills || (echo "skills/ directory not found" && exit 1)

      - name: Check command files
        run: |
          find commands -name "*.md" -type f | while read f; do
            test -s "$f" || (echo "$f is empty" && exit 1)
          done

      - name: Check agent files
        run: |
          find agents -name "*.md" -type f | while read f; do
            test -s "$f" || (echo "$f is empty" && exit 1)
            head -1 "$f" | grep -q "^---$" || (echo "$f missing frontmatter" && exit 1)
          done
