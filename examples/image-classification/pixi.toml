[project]
name = "cifar10-classification"
version = "0.1.0"
description = "CIFAR-10 image classification with PyTorch Lightning and Hydra"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = "3.10.*"
pytorch = ">=2.1"
pytorch-cuda = "12.1.*"  # Remove this line for CPU-only
torchvision = "*"
pytorch-lightning = ">=2.1"
hydra-core = ">=1.3"
tensorboard = ">=2.15"

[feature.wandb.dependencies]
wandb = ">=0.16"

[feature.dev.dependencies]
pytest = "*"
pytest-cov = "*"
ruff = "*"
mypy = "*"

[tasks]
train = "python src/train.py"
train-baseline = "python src/train.py experiment=baseline"
train-augmented = "python src/train.py experiment=augmented"
train-cpu = "python src/train.py trainer.accelerator=cpu"
train-gpu = "python src/train.py trainer=gpu"
train-debug = "python src/train.py trainer.fast_dev_run=true"
tensorboard = "tensorboard --logdir logs/"
test = "pytest tests/ -v"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
typecheck = "mypy src/"

[environments]
default = ["wandb", "dev"]
prod = []
cpu = { solve-group = "cpu" }
