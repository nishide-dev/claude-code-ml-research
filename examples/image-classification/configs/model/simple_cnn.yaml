# Simple CNN model for CIFAR-10

_target_: src.models.simple_cnn.SimpleCNN

# Model architecture
in_channels: 3
hidden_channels: 64
num_classes: 10

# Optimizer settings
lr: 0.001
weight_decay: 0.0001

