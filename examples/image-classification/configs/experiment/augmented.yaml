# @package _global_

# Augmented experiment: ResNet, data augmentation, 50 epochs
# Better accuracy, longer training time

defaults:
  - override /model: resnet
  - override /data: cifar10
  - override /trainer: default
  - override /logger: tensorboard

# Experiment name
name: augmented-experiment

# Model settings
model:
  lr: 0.0001

# Data settings
data:
  batch_size: 128
  augment_train: true
  normalize: true
  num_workers: 8

# Trainer settings
trainer:
  max_epochs: 50
  accelerator: auto

# Tags
tags: ["augmented", "resnet", "data-augmentation"]
