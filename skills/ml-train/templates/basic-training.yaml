# Basic Single-GPU Training Configuration
# Use this template for simple training runs on a single GPU

# python src/train.py experiment=basic_training

defaults:
  - override /model: your_model
  - override /data: your_dataset
  - override /trainer: default
  - override /logger: wandb

# Model configuration
model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 3e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: ${trainer.max_epochs}
    eta_min: 1e-6

# Data configuration
data:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  persistent_workers: true

# Trainer configuration
trainer:
  accelerator: gpu
  devices: 1
  max_epochs: 100
  precision: 16-mixed  # Mixed precision training for speed

  # Gradient settings
  gradient_clip_val: 1.0
  gradient_clip_algorithm: norm

  # Validation
  check_val_every_n_epoch: 1

  # Logging
  log_every_n_steps: 10

  # Fast dev run for testing (set to false for actual training)
  fast_dev_run: false

# Callbacks
callbacks:
  model_checkpoint:
    _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${paths.output_dir}/checkpoints
    filename: 'epoch_{epoch:03d}'
    monitor: val/loss
    mode: min
    save_top_k: 3
    save_last: true
    auto_insert_metric_name: false

  early_stopping:
    _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: val/loss
    mode: min
    patience: 10
    min_delta: 0.001

  learning_rate_monitor:
    _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: step

# Logging
logger:
  wandb:
    project: ${oc.env:WANDB_PROJECT,ml-project}
    name: ${experiment_name}
    tags: ["basic", "single-gpu"]
    log_model: true
    offline: false

# Experiment settings
experiment_name: basic_training
seed: 42
