# Model Configuration Template
# Location: configs/model/<model_name>.yaml
# Usage: python src/train.py model=<model_name>

_target_: src.models.<model_name>.Model

# Architecture parameters
input_dim: 784  # Input feature dimension
hidden_dims: [512, 256, 128]  # Hidden layer dimensions
output_dim: 10  # Output dimension (num_classes)
activation: relu  # relu, gelu, swish, leaky_relu
dropout: 0.2  # Dropout rate (0.0 to disable)
batch_norm: true  # Enable batch normalization

# Optimizer configuration
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.001  # Learning rate
  weight_decay: 0.0001  # L2 regularization
  betas: [0.9, 0.999]  # Adam beta parameters
  eps: 1e-8

# Learning rate scheduler
scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${trainer.max_epochs}  # Reference trainer config
  eta_min: 1e-6  # Minimum learning rate

