# Copier template configuration for ML Research Projects
# PyTorch Lightning + Hydra template for machine learning research

_min_copier_version: "9.0.0"

# ============================================================================
# User questions - Project基本情報
# ============================================================================

project_name:
  type: str
  help: "プロジェクト名を入力してください (Enterでディレクトリ名を使用)"
  default: "{{ _copier_conf.dst_path.name }}"

package_name:
  type: str
  help: "パッケージ名を入力してください (Pythonのインポート名、通常はスネークケース)"
  default: "{{ project_name | replace('-', '_') }}"

description:
  type: str
  help: "プロジェクトの短い説明を入力してください"
  default: "A machine learning research project with PyTorch Lightning and Hydra"

author_name:
  type: str
  help: "作者名を入力してください"
  default: "Your Name"

author_email:
  type: str
  help: "作者のメールアドレスを入力してください"
  default: "your.email@example.com"

python_version:
  type: str
  help: "対象とする最小Pythonバージョンを選択してください"
  default: "3.10"
  choices:
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"

# ============================================================================
# User questions - Package Manager
# ============================================================================

package_manager:
  type: str
  help: "パッケージマネージャーを選択してください"
  default: "uv"
  choices:
    "uv (高速、pip互換)": "uv"
    "pixi (Conda、GPU自動設定)": "pixi"

# ============================================================================
# User questions - 開発ツール設定
# ============================================================================

use_ruff:
  type: bool
  help: "Ruff (高速linter/formatter) を使用しますか？"
  default: true

use_ty:
  type: bool
  help: "ty (高速型チェッカー by Astral) を使用しますか？"
  default: true

use_pytest:
  type: bool
  help: "Pytest (テストフレームワーク) を使用しますか？"
  default: true

use_github_actions:
  type: bool
  help: "GitHub Actions CI/CDを設定しますか？"
  default: true

use_nix:
  type: bool
  help: "Nix + direnv による開発環境管理を使用しますか？"
  default: false

# ============================================================================
# User questions - PyTorch/CUDA configuration
# ============================================================================

pytorch_cuda_preset:
  type: str
  help: "PyTorch + CUDAのプリセットを選択してください"
  default: "pytorch-2.8.0-cuda-12.6"
  choices:
    "PyTorch 2.8.0 + CUDA 12.6 (推奨・安定版)": "pytorch-2.8.0-cuda-12.6"
    "PyTorch 2.9.0 + CUDA 12.6 (最新)": "pytorch-2.9.0-cuda-12.6"
    "PyTorch 2.9.0 + CUDA 13.0": "pytorch-2.9.0-cuda-13.0"
    "PyTorch 2.8.0 + CUDA 12.8": "pytorch-2.8.0-cuda-12.8"
    "PyTorch 2.7.1 + CUDA 12.6": "pytorch-2.7.1-cuda-12.6"
    "PyTorch 2.7.1 + CUDA 11.8": "pytorch-2.7.1-cuda-11.8"
    "PyTorch 2.6.0 + CUDA 12.4": "pytorch-2.6.0-cuda-12.4"
    "PyTorch 2.5.1 + CUDA 12.1": "pytorch-2.5.1-cuda-12.1"
    "PyTorch 2.4.1 + CUDA 11.8": "pytorch-2.4.1-cuda-11.8"
    "Custom (手動設定)": "custom"

pytorch_version:
  type: str
  help: "PyTorchバージョンを入力してください（例: 2.9.0, 2.8.0）"
  default: "2.8.0"
  when: "{{ pytorch_cuda_preset == 'custom' }}"

cuda_version:
  type: str
  help: "CUDAバージョンを入力してください（例: 12.6, 12.4, 11.8）"
  default: "12.6"
  when: "{{ pytorch_cuda_preset == 'custom' }}"

use_torchvision:
  type: bool
  help: "torchvisionを含めますか？"
  default: true

use_torchaudio:
  type: bool
  help: "torchaudioを含めますか？"
  default: false

# ============================================================================
# User questions - ML Framework configuration
# ============================================================================

use_lightning:
  type: bool
  help: "PyTorch Lightningを使用しますか？"
  default: true

lightning_version:
  type: str
  help: "PyTorch Lightningのバージョンを選択してください"
  default: "2.4"
  choices:
    - "2.4"
    - "2.3"
    - "2.2"
  when: "{{ use_lightning }}"

use_hydra:
  type: bool
  help: "Hydraを使用しますか？（設定管理フレームワーク）"
  default: true

hydra_version:
  type: str
  help: "Hydraのバージョンを選択してください"
  default: "1.3"
  choices:
    - "1.3"
    - "1.2"
  when: "{{ use_hydra }}"

use_pytorch_geometric:
  type: bool
  help: "PyTorch Geometric (GNN) を使用しますか？"
  default: false

# ============================================================================
# User questions - Experiment tracking
# ============================================================================

logger_choice:
  type: str
  help: "実験トラッキング用のロガーを選択してください"
  default: "tensorboard"
  choices:
    "TensorBoard (シンプル)": "tensorboard"
    "Weights & Biases (高機能)": "wandb"
    "MLflow (オンプレ向け)": "mlflow"
    "両方 (TensorBoard + W&B)": "both"
    "なし": "none"

wandb_entity:
  type: str
  help: "W&B entity名を入力してください（チームまたはユーザー名）"
  default: ""
  when: "{{ logger_choice in ['wandb', 'both'] }}"

# ============================================================================
# User questions - Project template type
# ============================================================================

template_type:
  type: str
  help: "プロジェクトテンプレートタイプを選択してください"
  default: "image-classification"
  choices:
    "画像分類 (Image Classification)": "image-classification"
    "セグメンテーション (Segmentation)": "segmentation"
    "物体検出 (Object Detection)": "object-detection"
    "テキスト分類 (Text Classification)": "text-classification"
    "GNN (Graph Neural Network)": "gnn"
    "カスタム (Minimal Template)": "minimal"

dataset_choice:
  type: str
  help: "初期データセットを選択してください（サンプルコード用）"
  default: "mnist"
  choices:
    "MNIST (手書き数字)": "mnist"
    "CIFAR-10 (画像10クラス)": "cifar10"
    "CIFAR-100 (画像100クラス)": "cifar100"
    "Fashion-MNIST": "fashion-mnist"
    "カスタム": "custom"
  when: "{{ template_type == 'image-classification' }}"

# ============================================================================
# File/directory exclusion settings
# ============================================================================

_exclude:
  - "copier.yml"
  - "copier.yaml"
  - ".git"
  - ".venv"
  - "__pycache__"
  - "*.pyc"
  - ".pytest_cache"
  - ".mypy_cache"
  - ".ruff_cache"
  - "uv.lock"
  - "pixi.lock"
  - ".pixi"
  - "dist"
  - "build"
  - "*.egg-info"
  - "{% if not use_ruff %}ruff.toml.jinja{% endif %}"
  - "{% if not use_nix %}.envrc.jinja{% endif %}"
  - "{% if not use_github_actions %}.github{% endif %}"
  - "{% if template_type != 'gnn' %}src/{{ package_name }}/models/gnn{% endif %}"
  - "{% if template_type != 'segmentation' %}src/{{ package_name }}/models/segmentation{% endif %}"

# ============================================================================
# Post-generation tasks
# ============================================================================

_tasks:
  - "git init -b main"
  - "git add ."
  - "{% if package_manager == 'uv' %}uv venv{% else %}echo 'Skipping uv venv (using pixi)'{% endif %}"
  - "{% if package_manager == 'uv' %}uv lock{% else %}echo 'Skipping uv lock (using pixi)'{% endif %}"
  - "{% if package_manager == 'uv' %}uv sync{% else %}pixi install{% endif %}"
  - "{% if use_ruff and package_manager == 'uv' %}uv run ruff check . --fix || true{% elif use_ruff %}pixi run ruff check . --fix || true{% else %}echo 'Skipping ruff check'{% endif %}"
  - "{% if use_ruff and package_manager == 'uv' %}uv run ruff format .{% elif use_ruff %}pixi run ruff format .{% else %}echo 'Skipping ruff format'{% endif %}"
  - "{% if use_ty and package_manager == 'uv' %}uv run ty check || true{% elif use_ty %}pixi run ty check || true{% else %}echo 'Skipping ty check'{% endif %}"
  - "{% if use_pytest and package_manager == 'uv' %}uv run pytest || true{% elif use_pytest %}pixi run pytest || true{% else %}echo 'Skipping pytest'{% endif %}"
  - "echo '✅ Quality checks completed!'"

  # Success message
  - |
    echo "
    ============================================================
    🎉 ML研究プロジェクトが正常に作成されました！
    ============================================================

    📦 Project: {{ project_name }}
    🔥 PyTorch: {{ pytorch_version }} + CUDA {{ cuda_version }}
    {% if use_lightning -%}
    ⚡ Lightning: {{ lightning_version }}
    {% endif -%}
    {% if use_hydra -%}
    🐉 Hydra: {{ hydra_version }}
    {% endif -%}
    📊 Logger: {{ logger_choice }}

    次のステップ:
      1. プロジェクトディレクトリに移動:
         cd {{ _copier_conf.dst_path }}

      2. 初回コミット (ファイルは既にステージング済み):
         git commit -m \"chore: initial commit from ml-research template\"

      3. 開発を開始:
         uv run python src/{{ package_name }}/train.py     # トレーニング開始
         uv run pytest tests/ -v                            # テスト実行
         uv run ruff format .                               # コードフォーマット

      4. CUDA動作確認:
         uv run python -c 'import torch; print(f\"CUDA available: {torch.cuda.is_available()}\")'

    {% if logger_choice == 'tensorboard' -%}
    📊 TensorBoard: tensorboard --logdir logs/
    {% endif -%}
    {% if logger_choice in ['wandb', 'both'] -%}
    📊 W&B: wandb login してから実行してください
    {% endif -%}

    📖 詳細: README.md を参照してください

    ============================================================
    "
