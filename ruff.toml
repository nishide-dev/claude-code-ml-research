# Ruff configuration for Claude Code ML Research Plugin
# This enforces best practices for Python code quality

line-length = 100
target-version = "py310"

[lint]
# Enable comprehensive rule sets
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "ANN",   # flake8-annotations
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "T10",   # flake8-debugger
    "EM",    # flake8-errmsg
    "LOG",   # flake8-logging
    "G",     # flake8-logging-format
    "INP",   # flake8-no-pep420
    "PIE",   # flake8-pie
    "T20",   # flake8-print (ban print statements)
    "PYI",   # flake8-pyi
    "PT",    # flake8-pytest-style
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SLF",   # flake8-self
    "SIM",   # flake8-simplify
    "TID",   # flake8-tidy-imports
    "TCH",   # flake8-type-checking
    "ARG",   # flake8-unused-arguments
    "PTH",   # flake8-use-pathlib
    "ERA",   # eradicate
    "PL",    # pylint
    "TRY",   # tryceratops
    "RUF",   # ruff-specific rules
]

ignore = [
    # Type annotation
    "ANN401",  # Dynamically typed expressions (Any) are allowed in some cases

    # Documentation
    "D100",    # Missing docstring in public module
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method
    "D107",    # Missing docstring in __init__

    # Complexity (sometimes necessary for ML code)
    "PLR0911", # Too many return statements
    "PLR0912", # Too many branches
    "PLR0913", # Too many arguments to function call
    "PLR0915", # Too many statements

    # Others
    "TRY003",  # Avoid specifying long messages outside exception class (common pattern)
    "EM101",   # Exception must not use a string literal (sometimes needed)
    "EM102",   # Exception must not use an f-string literal (sometimes needed)
]

# Allow fix for all enabled rules (when `--fix` is provided)
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
# Test files can be less strict
"tests/**/*.py" = [
    "ANN",     # No type annotations required in tests
    "S101",    # Use of assert is fine in tests
    "PLR2004", # Magic value comparison is fine in tests
    "ARG",     # Unused arguments are fine in fixtures
]

# __init__ files can have unused imports
"**/__init__.py" = [
    "F401",    # Imported but unused (re-exports)
]

# Scripts can be less strict for quick prototyping
"scripts/**/*.py" = [
    "T201",    # Print is allowed in scripts
]

# Example files can be simpler
"examples/**/*.py" = [
    "INP001",  # Implicit namespace package
    "T201",    # Print is allowed in examples
]

# Skill scripts are example/template code - allow more flexibility
"skills/**/scripts/*.py" = [
    "T201",    # Print is allowed in CLI scripts
    "ANN",     # Type annotations optional in examples
    "ARG001",  # Unused arguments OK (template code)
    "PLR2004", # Magic values OK in examples
    "PLC0415", # Imports inside functions OK for examples
    "N812",    # Lowercase imported as non-lowercase OK
    "G004",    # f-strings in logging OK for examples
    "PTH123",  # open() instead of Path.open() OK for readability
    "DTZ005",  # datetime.now() without tz OK for examples
    "B008",    # Function calls in defaults OK for examples
    "RUF001",  # Ambiguous unicode characters OK (info symbols)
]

# Skill templates are example code
"skills/**/templates/*.py" = [
    "INP001",  # Implicit namespace package
    "ANN",     # Type annotations optional
    "ARG002",  # Unused method arguments OK (interface requirements)
]

# Skill examples are demonstration code
"skills/**/examples/*.py" = [
    "INP001",  # Implicit namespace package
    "T201",    # Print is allowed
    "ANN",     # Type annotations optional
]

[lint.isort]
known-first-party = ["scripts"]
force-sort-within-sections = true
lines-after-imports = 2

[lint.pydocstyle]
convention = "google"

[lint.pylint]
max-args = 10
max-branches = 15
max-returns = 8
max-statements = 60

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true

[lint.flake8-type-checking]
strict = true

[lint.flake8-annotations]
mypy-init-return = true
suppress-dummy-args = true
suppress-none-returning = true
